<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>XSGD/USDC Price Monitor</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="XSGD Monitor">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d1a;
      --surface:  #16213e;
      --border:   #1e3a6e;
      --accent:   #e94560;
      --teal:     #a8dadc;
      --text:     #eee;
      --muted:    #667;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding-top: calc(var(--safe-top) + 1rem);
      padding-bottom: calc(var(--safe-bot) + 1rem);
      padding-left: 1rem;
      padding-right: 1rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: var(--accent);
      font-weight: 700;
    }

    /* ── FX card ── */
    .fx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fx-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .fx-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 1px;
    }

    .fx-source {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
    }

    .fx-error { color: var(--accent); font-size: 0.9rem; }

    /* ── Alert banners ── */
    .alert-banner {
      background: #3d0a14;
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.75rem;
      display: none;
      gap: 0.75rem;
      animation: slideDown 0.25s ease;
    }

    .alert-banner.active { display: flex; align-items: flex-start; }

    .alert-icon { font-size: 1.1rem; padding-top: 1px; }
    .alert-text { font-size: 0.88rem; font-weight: 600; }
    .alert-detail { font-size: 0.75rem; color: #f87; margin-top: 0.25rem; line-height: 1.4; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Spread summary ── */
    .spread-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      margin-bottom: 0.75rem;
      display: none;
      justify-content: space-between;
    }

    .spread-summary.visible { display: flex; }

    .sum-item { text-align: center; }
    .sum-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .sum-val { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-top: 0.1rem; font-family: monospace; }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .control-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 90px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .threshold-val {
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 700;
      min-width: 52px;
      text-align: right;
    }

    select {
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 0.4rem 0.7rem;
      font-size: 0.88rem;
      cursor: pointer;
      -webkit-appearance: none;
    }

    /* ── Price cards ── */
    .price-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .price-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .price-card.card-max { border-color: #2ecc71; background: rgba(46,204,113,0.06); }
    .price-card.card-min { border-color: #e74c3c; background: rgba(231,76,60,0.06); }
    .price-card.card-stale { opacity: 0.4; }

    .card-left { flex: 1; min-width: 0; }

    .card-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .card-right { text-align: right; flex-shrink: 0; }

    .card-price {
      font-family: monospace;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-price.price-max { color: #2ecc71; }
    .card-price.price-min { color: #e74c3c; }

    .card-dev {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
      font-family: monospace;
    }

    .card-dev.dev-alert { color: #e74c3c; font-weight: 700; }

    /* badges */
    .badge {
      display: inline-block;
      font-size: 0.6rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
      font-weight: 700;
    }

    .badge-high  { background: #1a4a2e; color: #2ecc71; }
    .badge-low   { background: #4a1a1a; color: #e74c3c; }
    .badge-stale { background: #3a3a1a; color: #f0c040; }

    /* chain colours */
    .chain-base      { color: #4fc3f7; }
    .chain-polygon   { color: #9b59b6; }
    .chain-avalanche { color: #e74c3c; }

    .type-cex { color: var(--accent); }
    .type-dex { color: var(--teal); }

    /* loading / error */
    .status-msg {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .status-msg.error { color: var(--accent); }

    /* ── Footer ── */
    .footer {
      margin-top: 0.9rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 0 0.2rem;
    }

    .countdown.soon { color: var(--teal); }
  </style>
</head>
<body>

  <div class="header">
    <h1>XSGD / USDC</h1>
  </div>

  <!-- FX rate -->
  <div class="fx-card">
    <div>
      <div class="fx-label">1 SGD =</div>
      <div class="fx-value" id="fx-value">—</div>
    </div>
    <div class="fx-source" id="fx-date"></div>
  </div>

  <!-- Alerts -->
  <div class="alert-banner" id="alert-banner">
    <div class="alert-icon">⚠</div>
    <div>
      <div class="alert-text" id="alert-text"></div>
      <div class="alert-detail" id="alert-detail"></div>
    </div>
  </div>

  <div class="alert-banner" id="spot-alert-banner">
    <div class="alert-icon">📍</div>
    <div>
      <div class="alert-text" id="spot-alert-text"></div>
      <div class="alert-detail" id="spot-alert-detail"></div>
    </div>
  </div>

  <!-- Spread summary -->
  <div class="spread-summary" id="spread-summary">
    <div class="sum-item">
      <div class="sum-label">High</div>
      <div class="sum-val" id="sum-max">—</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Low</div>
      <div class="sum-val" id="sum-min">—</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Spread</div>
      <div class="sum-val" id="sum-spread">—</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-row">
      <span class="control-label">Spread alert</span>
      <input type="range" id="threshold-slider" min="1" max="100" value="20">
      <span class="threshold-val" id="threshold-val">20 bps</span>
    </div>
    <div class="control-row">
      <span class="control-label">Spot alert</span>
      <input type="range" id="spot-threshold-slider" min="1" max="100" value="20">
      <span class="threshold-val" id="spot-threshold-val">20 bps</span>
    </div>
    <div class="control-row">
      <span class="control-label">Refresh</span>
      <select id="refresh-select">
        <option value="15">Every 15 s</option>
        <option value="30" selected>Every 30 s</option>
        <option value="60">Every 60 s</option>
      </select>
    </div>
  </div>

  <!-- Price cards -->
  <div class="price-list" id="price-list">
    <div class="status-msg">Fetching data…</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span id="last-updated"></span>
    <span class="countdown" id="countdown"></span>
  </div>

<script>
  const COINGECKO_URL = 'https://api.coingecko.com/api/v3/coins/xsgd/tickers?depth=false&include_exchange_logo=false';
  const OANDA_TOKEN = '3eb69a25e2d332bfa94fb0b86e412d14-82b980708806f6549858fa908ae62223';
  const FX_URL = 'https://api-fxpractice.oanda.com/v3/instruments/USD_SGD/candles?count=1&granularity=S5&price=M';

  const XSGD_ADDRS = new Set([
    '0xdc3326e71d45186f113a2f448984ca0e8d201995',
    '0x0a4c9cb2778ab3302996a34befcf9a8bc288c33b',
    '0xb2f85b7ab3c2b6f62df06de6ae7d09c010a5096e',
    '0x70e8de73ce538da2beed35d14187f6959a8eca96',
  ]);

  const USDC_ADDRS = new Set([
    '0x2791bca1f2de4661ed88a30c99a7a9449aa84174',
    '0x3c499c542cef5e3811e1192ce70d8cc03d5c3359',
    '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913',
    '0xb97ef9ef8734c71904d8002f8b6bc66dd9c48a6e',
  ]);

  const CEX_IDS = new Set(['gdax', 'coinbase', 'coinbase_advanced', 'coinbase_advanced_trade', 'coinbase_exchange']);

  const KNOWN_DEX = {
    'aerodrome-slipstream':           { name: 'Aerodrome',    chain: 'Base' },
    'aerodrome_slipstream':           { name: 'Aerodrome',    chain: 'Base' },
    'uniswap_v3_polygon_pos':         { name: 'Uniswap V3',   chain: 'Polygon' },
    'uniswap-v3-polygon':             { name: 'Uniswap V3',   chain: 'Polygon' },
    'uniswap-v3-avalanche':           { name: 'Uniswap V3',   chain: 'Avalanche' },
    'uniswap_v3_avalanche':           { name: 'Uniswap V3',   chain: 'Avalanche' },
    'uniswap-v3-base':                { name: 'Uniswap V3',   chain: 'Base' },
    'uniswap_v3_base':                { name: 'Uniswap V3',   chain: 'Base' },
    'pharaoh-exchange-v1':            { name: 'Pharaoh',      chain: 'Avalanche' },
    'pharaoh-exchange-v2':            { name: 'Pharaoh',      chain: 'Avalanche' },
    'pharaoh-exchange-v3':            { name: 'Pharaoh V3',   chain: 'Avalanche' },
    'pharaoh_exchange':               { name: 'Pharaoh',      chain: 'Avalanche' },
    'pancakeswap-infinity-clmm-base': { name: 'PancakeSwap',  chain: 'Base' },
    'pancakeswap_new':                { name: 'PancakeSwap',  chain: 'Base' },
    'quickswap_v3':                   { name: 'QuickSwap V3', chain: 'Polygon' },
    'quickswap-v3':                   { name: 'QuickSwap V3', chain: 'Polygon' },
  };

  const TARGET_CHAINS = new Set(['Base', 'Polygon', 'Avalanche']);

  function detectChain(url) {
    if (!url) return null;
    const u = url.toLowerCase();
    if (u.includes('polygon')   || u.includes('/137/')   || u.includes('chain=137'))   return 'Polygon';
    if (u.includes('avalanche') || u.includes('/43114/') || u.includes('chain=43114') || u.includes('avax')) return 'Avalanche';
    if (u.includes('/base')     || u.includes('base.org') || u.includes('/8453/')  || u.includes('chain=8453') || u.includes('aerodrome')) return 'Base';
    return null;
  }

  function resolveExchange(ticker) {
    const id  = (ticker.market.identifier || '').toLowerCase();
    const url = ticker.trade_url || ticker.token_info_url || '';
    if (CEX_IDS.has(id) || id.startsWith('coinbase')) return { name: 'Coinbase', chain: '—', type: 'CEX' };
    if (KNOWN_DEX[id]) return { ...KNOWN_DEX[id], type: 'DEX' };
    const chain = detectChain(url);
    if (chain && TARGET_CHAINS.has(chain)) {
      return { name: id.includes('uniswap') ? 'Uniswap V3' : ticker.market.name, chain, type: 'DEX' };
    }
    return null;
  }

  function getPrice(ticker) {
    const b = (ticker.base   || '').toLowerCase();
    const t = (ticker.target || '').toLowerCase();
    const bIsXsgd = b === 'xsgd' || XSGD_ADDRS.has(b);
    const tIsXsgd = t === 'xsgd' || XSGD_ADDRS.has(t);
    const bIsUsdc = b === 'usdc' || b === 'usd' || USDC_ADDRS.has(b);
    const tIsUsdc = t === 'usdc' || t === 'usd' || USDC_ADDRS.has(t);
    if (bIsXsgd && tIsUsdc) return ticker.last;
    if (tIsXsgd && bIsUsdc && ticker.last > 0) return 1 / ticker.last;
    return null;
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let threshold = 20, spotThreshold = 20, spotRate = null;
  let refreshSecs = 30, countdownLeft = 30;
  let countdownHandle = null, refreshHandle = null;
  let lastRows = [], notifGranted = false, audioCtx = null;

  function beep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.6);
    } catch (_) {}
  }

  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') { notifGranted = true; return; }
    if (Notification.permission !== 'denied') {
      notifGranted = (await Notification.requestPermission()) === 'granted';
    }
  }

  function sendNotif(title, body) {
    if (notifGranted) new Notification(title, { body });
  }

  async function fetchFX() {
    try {
      const res = await fetch(FX_URL, { headers: { 'Authorization': `Bearer ${OANDA_TOKEN}` } });
      const data = await res.json();
      const candle = data.candles?.[0];
      if (candle) {
        spotRate = 1 / parseFloat(candle.mid.c);
        document.getElementById('fx-value').textContent = spotRate.toFixed(4) + ' USD';
        const ts = candle.time ? new Date(candle.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        document.getElementById('fx-date').textContent = `Oanda · ${ts}`;
      }
    } catch {
      document.getElementById('fx-value').innerHTML = '<span class="fx-error">Unavailable</span>';
    }
  }

  async function fetchTickers() {
    let res;
    try {
      res = await fetch(COINGECKO_URL);
    } catch (netErr) {
      throw new Error(`Network error — check your connection`);
    }
    if (res.status === 429) throw new Error(`Rate limited by CoinGecko (429) — try again in a minute`);
    if (!res.ok) throw new Error(`CoinGecko error ${res.status}`);
    const { tickers = [] } = await res.json();
    console.log('[XSGD Monitor] Raw tickers:', tickers);

    const seen = new Map(), rows = [];
    for (const t of tickers) {
      const exch = resolveExchange(t);
      if (!exch) continue;
      if (exch.type === 'DEX' && !TARGET_CHAINS.has(exch.chain)) continue;
      const price = getPrice(t);
      if (price === null || price <= 0) continue;
      const key = `${exch.name}|${exch.chain}`;
      if (seen.has(key)) {
        if ((t.volume || 0) > seen.get(key).volume) Object.assign(seen.get(key), { price, volume: t.volume || 0, stale: t.is_stale });
        continue;
      }
      const row = { ...exch, price, volume: t.volume || 0, stale: t.is_stale };
      seen.set(key, row); rows.push(row);
    }
    return rows;
  }

  function fmtVol(v) {
    if (!v) return '';
    if (v >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
    if (v >= 1e3) return `$${(v/1e3).toFixed(0)}K`;
    return `$${v.toFixed(0)}`;
  }

  function chainClass(chain) {
    return chain === 'Base' ? 'chain-base' : chain === 'Polygon' ? 'chain-polygon' : chain === 'Avalanche' ? 'chain-avalanche' : '';
  }

  function renderCards(rows) {
    const list = document.getElementById('price-list');
    if (!rows.length) {
      list.innerHTML = '<div class="status-msg error">No matching pairs found.</div>';
      document.getElementById('spread-summary').classList.remove('visible');
      return;
    }

    const active = rows.filter(r => !r.stale);
    const stale  = rows.filter(r => r.stale);
    const prices = active.map(r => r.price);
    const maxP   = prices.length ? Math.max(...prices) : 0;
    const minP   = prices.length ? Math.min(...prices) : 0;
    const spreadBps = minP > 0 ? ((maxP - minP) / minP) * 10000 : 0;

    active.sort((a, b) => b.price - a.price);

    const makeCard = (r, isStale) => {
      const isMax    = !isStale && r.price === maxP;
      const isMin    = !isStale && r.price === minP && active.length > 1;
      const cardCls  = isStale ? 'card-stale' : isMax ? 'card-max' : isMin ? 'card-min' : '';
      const priceCls = isMax ? 'price-max' : isMin ? 'price-min' : '';
      const badge    = isStale
        ? '<span class="badge badge-stale">STALE</span>'
        : isMax ? '<span class="badge badge-high">HIGH</span>'
        : isMin ? '<span class="badge badge-low">LOW</span>' : '';
      const typeCls  = r.type === 'CEX' ? 'type-cex' : 'type-dex';
      const vol      = fmtVol(r.volume);
      const meta     = [`<span class="${chainClass(r.chain)}">${r.chain}</span>`, `<span class="${typeCls}">${r.type}</span>`, vol].filter(Boolean).join(' · ');

      let devHtml = '';
      if (!isStale && spotRate) {
        const devBps  = ((r.price - spotRate) / spotRate) * 10000;
        const flagged = Math.abs(devBps) >= spotThreshold;
        const sign    = devBps >= 0 ? '+' : '';
        devHtml = `<div class="card-dev ${flagged ? 'dev-alert' : ''}">${sign}${devBps.toFixed(1)} bps${flagged ? ' ⚑' : ''}</div>`;
      }

      return `
        <div class="price-card ${cardCls}">
          <div class="card-left">
            <div class="card-name">${r.name}${badge}</div>
            <div class="card-meta">${meta}</div>
          </div>
          <div class="card-right">
            <div class="card-price ${priceCls}">${r.price.toFixed(5)}</div>
            ${devHtml}
          </div>
        </div>`;
    };

    list.innerHTML = active.map(r => makeCard(r, false)).join('') + stale.map(r => makeCard(r, true)).join('');

    document.getElementById('sum-max').textContent    = maxP.toFixed(5);
    document.getElementById('sum-min').textContent    = minP.toFixed(5);
    document.getElementById('sum-spread').textContent = `${spreadBps.toFixed(1)} bps`;
    document.getElementById('spread-summary').classList.add('visible');

    return { maxP, minP, spreadBps };
  }

  function checkAlert(rows, spreadBps, maxP, minP) {
    const banner = document.getElementById('alert-banner');
    const active = rows.filter(r => !r.stale);
    if (active.length < 2 || spreadBps < threshold) { banner.classList.remove('active'); return; }
    const maxRow = rows.find(r => r.price === maxP);
    const minRow = rows.find(r => r.price === minP);
    document.getElementById('alert-text').textContent = `Spread ${spreadBps.toFixed(1)} bps — above ${threshold} bps threshold`;
    document.getElementById('alert-detail').textContent = `High: ${maxRow.name} @ ${maxP.toFixed(5)}  ·  Low: ${minRow.name} @ ${minP.toFixed(5)}`;
    const wasActive = banner.classList.contains('active');
    banner.classList.add('active');
    if (!wasActive) { beep(); sendNotif('XSGD Spread Alert', `${spreadBps.toFixed(1)} bps`); }
  }

  function checkSpotAlert(rows) {
    const banner = document.getElementById('spot-alert-banner');
    if (!spotRate) { banner.classList.remove('active'); return; }
    const flagged = rows.filter(r => !r.stale && Math.abs(((r.price - spotRate) / spotRate) * 10000) >= spotThreshold);
    if (!flagged.length) { banner.classList.remove('active'); return; }
    const lines = flagged.map(r => {
      const d = ((r.price - spotRate) / spotRate) * 10000;
      return `${r.name}: ${d >= 0 ? '+' : ''}${d.toFixed(1)} bps`;
    });
    document.getElementById('spot-alert-text').textContent = `${flagged.length} venue${flagged.length > 1 ? 's' : ''} deviate ≥ ${spotThreshold} bps from spot`;
    document.getElementById('spot-alert-detail').textContent = lines.join('  ·  ');
    const wasActive = banner.classList.contains('active');
    banner.classList.add('active');
    if (!wasActive) { beep(); sendNotif('XSGD Spot Alert', lines.join('\n')); }
  }

  async function refresh() {
    document.getElementById('last-updated').textContent = 'Refreshing…';
    await fetchFX().catch(() => {});
    try {
      const rows = await fetchTickers();
      lastRows = rows;
      const result = renderCards(rows);
      if (result) { checkAlert(rows, result.spreadBps, result.maxP, result.minP); checkSpotAlert(rows); }
      document.getElementById('last-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      document.getElementById('price-list').innerHTML = `<div class="status-msg error">Error: ${e.message}</div>`;
      document.getElementById('last-updated').textContent = 'Fetch failed';
    }
    startCountdown();
  }

  function startCountdown() {
    clearInterval(countdownHandle);
    countdownLeft = refreshSecs;
    const el = document.getElementById('countdown');
    const tick = () => {
      el.className = countdownLeft <= 5 ? 'countdown soon' : 'countdown';
      el.textContent = `Refresh in ${countdownLeft}s`;
      countdownLeft--;
    };
    tick();
    countdownHandle = setInterval(tick, 1000);
  }

  function scheduleRefresh() {
    clearInterval(refreshHandle);
    refreshHandle = setInterval(() => { clearInterval(countdownHandle); refresh(); }, refreshSecs * 1000);
  }

  document.getElementById('threshold-slider').addEventListener('input', e => {
    threshold = +e.target.value;
    document.getElementById('threshold-val').textContent = `${threshold} bps`;
    if (lastRows.length) {
      const prices = lastRows.map(r => r.price), maxP = Math.max(...prices), minP = Math.min(...prices);
      checkAlert(lastRows, minP > 0 ? ((maxP - minP) / minP) * 10000 : 0, maxP, minP);
    }
  });

  document.getElementById('spot-threshold-slider').addEventListener('input', e => {
    spotThreshold = +e.target.value;
    document.getElementById('spot-threshold-val').textContent = `${spotThreshold} bps`;
    if (lastRows.length) { renderCards(lastRows); checkSpotAlert(lastRows); }
  });

  document.getElementById('refresh-select').addEventListener('change', e => {
    refreshSecs = +e.target.value; scheduleRefresh(); startCountdown();
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  requestNotifPermission();
  refresh();
  scheduleRefresh();
</script>
</body>
</html>
