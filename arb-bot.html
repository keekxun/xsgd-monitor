<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XSGD Arb Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.7rem;
      letter-spacing: 3px;
      color: #2ecc71;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    /* FX card */
    .fx-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .fx-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .fx-value { font-size: 1.6rem; font-weight: bold; color: #a8dadc; }
    .fx-date  { font-size: 0.78rem; color: #555; margin-left: auto; }
    .fx-error { color: #e94560; font-size: 0.9rem; }

    /* ARB BANNER */
    .arb-banner {
      background: #0d2b1a;
      border: 2px solid #2ecc71;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: slideIn 0.3s ease;
    }

    .arb-banner.active { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .banner-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .banner-icon { font-size: 1.4rem; }

    .banner-title {
      font-size: 1rem;
      font-weight: bold;
      color: #2ecc71;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .banner-spread {
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      font-family: monospace;
    }

    .dismiss-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #2ecc71;
      color: #2ecc71;
      padding: 0.3rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }

    .dismiss-btn:hover { background: #1a4a2e; }

    .banner-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .action {
      flex: 1;
      min-width: 240px;
      background: #0a1f12;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .action-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .action.buy  .action-label { color: #2ecc71; }
    .action.sell .action-label { color: #e74c3c; }

    .action-venue { font-size: 1rem; font-weight: bold; color: #eee; }
    .action-chain { font-size: 0.8rem; color: #888; }

    .action-price {
      font-size: 1.4rem;
      font-weight: bold;
      font-family: monospace;
      color: #fff;
    }

    .action-link {
      display: inline-block;
      margin-top: 0.4rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.15s;
    }

    .action.buy  .action-link { background: #1a4a2e; color: #2ecc71; border: 1px solid #2ecc71; }
    .action.sell .action-link { background: #4a1a1a; color: #e74c3c; border: 1px solid #e74c3c; }
    .action-link:hover { opacity: 0.8; }

    .banner-note {
      font-size: 0.78rem;
      color: #666;
      border-top: 1px solid #1a3a1a;
      padding-top: 0.7rem;
    }

    .banner-time { font-size: 0.75rem; color: #444; }

    .opp-divider { border: none; border-top: 1px solid #1a3a1a; margin: 0.3rem 0; }
    .opp-header { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .opp-spread { font-size: 1.1rem; font-weight: bold; font-family: monospace; color: #fff; }
    .opp-pair   { font-size: 0.85rem; color: #2ecc71; }
    .opp-min    { font-size: 0.78rem; color: #555; margin-left: auto; }

    /* Controls */
    .controls {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .control-group { display: flex; align-items: center; gap: 0.7rem; }

    .control-group label {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      background: #0f3460;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2ecc71;
      cursor: pointer;
    }

    .threshold-val {
      font-size: 0.95rem;
      color: #2ecc71;
      font-weight: bold;
      min-width: 60px;
    }

    select {
      background: #0f3460;
      color: #eee;
      border: 1px solid #1a4a80;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Price table */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #0f3460;
      margin-bottom: 0.8rem;
    }

    table { width: 100%; border-collapse: collapse; background: #16213e; }

    thead th {
      background: #0f3460;
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a8dadc;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #0f3460; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1d2e50; }

    tbody td { padding: 0.7rem 1rem; font-size: 0.9rem; white-space: nowrap; }

    .type-cex { color: #e94560; font-weight: 600; }
    .type-dex { color: #a8dadc; font-weight: 600; }

    .chain-base      { color: #4fc3f7; }
    .chain-polygon   { color: #9b59b6; }
    .chain-avalanche { color: #e74c3c; }

    .price-val { font-family: monospace; font-size: 1rem; font-weight: bold; }
    .price-max { color: #2ecc71; }
    .price-min { color: #e74c3c; }
    .price-sub { display: block; font-size: 0.72rem; color: #666; font-family: monospace; margin-top: 2px; }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .badge-high  { background: #1a4a2e; color: #2ecc71; }
    .badge-low   { background: #4a1a1a; color: #e74c3c; }
    .badge-stale { background: #3a3a1a; color: #f0c040; }

    .volume { color: #777; font-size: 0.82rem; }
    .row-stale { opacity: 0.4; }

    .loading-row td { text-align: center; color: #555; padding: 2rem; }
    .error-row   td { text-align: center; color: #e94560; padding: 2rem; font-size: 0.9rem; }

    /* Spread bar */
    .spread-summary {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      margin-bottom: 1rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #888;
    }

    .spread-summary span b { color: #eee; }
    .spread-live { color: #2ecc71 !important; }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #555;
      padding: 0 0.2rem;
    }

    .countdown { color: #0f3460; }
    .countdown.soon { color: #a8dadc; }
  </style>
</head>
<body>
<div class="container">
  <h1>XSGD / USDC ARB BOT</h1>

  <!-- FX rate -->
  <div class="fx-card">
    <div>
      <div class="fx-label">SGD / USD Spot</div>
      <div class="fx-value" id="fx-value">—</div>
    </div>
    <div class="fx-date" id="fx-date"></div>
  </div>

  <!-- Arb alert banner -->
  <div class="arb-banner" id="arb-banner">
    <div class="banner-header">
      <span class="banner-icon">⚡</span>
      <span class="banner-title">Arb Opportunities</span>
      <button class="dismiss-btn" id="dismiss-btn">Dismiss</button>
    </div>
    <div id="opportunities-list"></div>
    <div class="banner-note">Verify live prices before executing. Thresholds reflect historical profitability after fees and slippage.</div>
    <div class="banner-time" id="banner-time"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>Refresh Every</label>
      <select id="refresh-select">
        <option value="15">15 s</option>
        <option value="30" selected>30 s</option>
        <option value="60">60 s</option>
      </select>
    </div>
  </div>

  <!-- Per-pair DEX spread summary -->
  <div class="spread-summary" id="spread-summary" style="display:none"></div>

  <!-- Price table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Exchange</th>
          <th>Chain</th>
          <th>Type</th>
          <th>Price (USDC)</th>
          <th>24h Volume</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row"><td colspan="5">Fetching data…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <span id="last-updated"></span>
    <span class="countdown" id="countdown"></span>
  </div>
</div>

<script>
  const OANDA_TOKEN       = '3eb69a25e2d332bfa94fb0b86e412d14-82b980708806f6549858fa908ae62223';
  const FX_URL            = 'https://api-fxpractice.oanda.com/v3/instruments/USD_SGD/candles?count=1&granularity=S5&price=M';
  const COINBASE_URL      = 'https://www.coinbase.com/advanced-trade/spot/XSGD-USDC';
  const COINBASE_BOOK_URL = 'https://api.exchange.coinbase.com/products/XSGD-USDC/book?level=2';
  const TRADE_SIZE_USDC   = 10000;

  const DEX_POOLS = [
    { chain: 'polygon',   address: '0x9bcef8ddd75817e66e01a5af313c776c74319394', name: 'Uniswap V3', display: 'Polygon'   },
    { chain: 'base',      address: '0x892a6ab3fa0f1f839fcb0ae264a8c4bbfb030725', name: 'Aerodrome',  display: 'Base'      },
    { chain: 'avalanche', address: '0x2b69e592cddfad48a93eba25e6d2709a6c077a1a', name: 'Uniswap V3', display: 'Avalanche' },
  ];


  // Minimum spread (bps) for each DEX-to-DEX pair to be considered profitable
  const PAIR_THRESHOLDS = {
    'Polygon-Base':      15,
    'Base-Polygon':      15,
    'Polygon-Avalanche': 25,
    'Avalanche-Polygon': 25,
    'Base-Avalanche':    20,
    'Avalanche-Base':    20,
  };

  // Minimum spread (bps) for Coinbase vs each DEX chain to be considered profitable
  const CEX_THRESHOLDS = {
    'Base':      10,
    'Polygon':   15,
    'Avalanche': 20,
  };

  // ── State ───────────────────────────────────────────────────────────────────
  let refreshSecs     = 30;
  let countdownLeft   = 30;
  let countdownHandle = null;
  let refreshHandle   = null;
  let dismissed       = false;
  let audioCtx        = null;

  // ── Audio ───────────────────────────────────────────────────────────────────
  function beep() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = 660;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.8);
    } catch (_) {}
  }

  // ── Order book walker ───────────────────────────────────────────────────────
  // Walks bid or ask levels and returns the effective USDC/XSGD price for a
  // given USDC trade size (buy or sell direction is symmetric in USDC terms).
  function walkBook(levels, tradeUSDC) {
    let remaining = tradeUSDC;
    let xsgd = 0, usdc = 0;
    for (const [priceStr, sizeStr] of levels) {
      const p = parseFloat(priceStr);
      const s = parseFloat(sizeStr);
      if (!p || !s) continue;
      const fill = Math.min(s * p, remaining);
      xsgd += fill / p;
      usdc += fill;
      remaining -= fill;
      if (remaining <= 0) break;
    }
    return xsgd > 0 ? usdc / xsgd : null;
  }

  // ── Fetch FX ────────────────────────────────────────────────────────────────
  async function fetchFX() {
    try {
      const res    = await fetch(FX_URL, { headers: { 'Authorization': `Bearer ${OANDA_TOKEN}` } });
      const data   = await res.json();
      const candle = data.candles?.[0];
      if (candle) {
        const sgdUsd = 1 / parseFloat(candle.mid.c);
        document.getElementById('fx-value').textContent = sgdUsd.toFixed(4);
        const ts = candle.time ? new Date(candle.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        document.getElementById('fx-date').textContent = `Oanda live · ${ts}`;
      }
    } catch (_) {
      document.getElementById('fx-value').innerHTML = '<span class="fx-error">Unavailable</span>';
    }
  }

  // ── Fetch tickers ───────────────────────────────────────────────────────────
  async function fetchTickers() {
    const [cbRes, ...dsParsed] = await Promise.all([
      fetch(COINBASE_BOOK_URL).then(r => r.ok ? r.json() : null).catch(() => null),
      ...DEX_POOLS.map(pool =>
        fetch(`https://api.dexscreener.com/latest/dex/pairs/${pool.chain}/${pool.address}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      ),
    ]);

    const rows = [];

    // Coinbase effective prices from order book (10k USDC trade size)
    if (cbRes) {
      const effectiveAsk = walkBook(cbRes.asks, TRADE_SIZE_USDC);
      const effectiveBid = walkBook(cbRes.bids, TRADE_SIZE_USDC);
      if (effectiveAsk && effectiveBid) {
        rows.push({
          name: 'Coinbase',
          chain: '—',
          type: 'CEX',
          price: (effectiveAsk + effectiveBid) / 2,
          effectiveAsk,
          effectiveBid,
          volume: null,
          stale: false,
          tradeUrl: COINBASE_URL,
        });
      }
    }

    // DEX pools from DexScreener
    dsParsed.forEach((dsData, i) => {
      if (!dsData) return;
      const pool = DEX_POOLS[i];
      const pair = dsData.pairs?.[0];
      if (!pair) return;
      const base  = (pair.baseToken?.symbol  || '').toUpperCase();
      const quote = (pair.quoteToken?.symbol || '').toUpperCase();
      const raw   = parseFloat(pair.priceNative);
      let price   = null;
      if (base === 'XSGD' && (quote === 'USDC' || quote === 'USD')) price = raw;
      if (quote === 'XSGD' && (base === 'USDC' || base === 'USD') && raw > 0) price = 1 / raw;
      if (price && price > 0) {
        rows.push({ name: pool.name, chain: pool.display, type: 'DEX', price, volume: pair.volume?.h24 || 0, stale: false, tradeUrl: `https://dexscreener.com/${pool.chain}/${pool.address}` });
      }
    });

    return rows;
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function chainClass(chain) {
    if (chain === 'Base')      return 'chain-base';
    if (chain === 'Polygon')   return 'chain-polygon';
    if (chain === 'Avalanche') return 'chain-avalanche';
    return '';
  }

  function fmtVol(v) {
    if (!v) return '—';
    if (v >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
    if (v >= 1e3) return `$${(v/1e3).toFixed(1)}K`;
    return `$${v.toFixed(0)}`;
  }

  function renderTable(rows) {
    const tbody  = document.getElementById('table-body');
    const active = rows.filter(r => !r.stale);
    const stale  = rows.filter(r => r.stale);

    if (!rows.length) {
      tbody.innerHTML = '<tr class="error-row"><td colspan="5">No matching pairs found.</td></tr>';
      document.getElementById('spread-summary').style.display = 'none';
      return;
    }

    const prices = active.map(r => r.price);
    const maxP   = prices.length ? Math.max(...prices) : 0;
    const minP   = prices.length ? Math.min(...prices) : 0;

    active.sort((a, b) => b.price - a.price);

    const activeHtml = active.map(r => {
      const isMax    = r.price === maxP;
      const isMin    = r.price === minP && active.length > 1;
      const priceCls = isMax ? 'price-max' : isMin ? 'price-min' : '';
      const badge    = isMax
        ? '<span class="badge badge-high">HIGH</span>'
        : isMin ? '<span class="badge badge-low">LOW</span>' : '';
      const typeCls  = r.type === 'CEX' ? 'type-cex' : 'type-dex';
      const priceCell = r.type === 'CEX'
        ? `<span class="price-val ${priceCls}">${r.price.toFixed(6)}</span>${badge}<span class="price-sub">bid ${r.effectiveBid.toFixed(6)} · ask ${r.effectiveAsk.toFixed(6)}</span>`
        : `<span class="price-val ${priceCls}">${r.price.toFixed(6)}</span>${badge}`;
      return `
        <tr>
          <td>${r.name}</td>
          <td class="${chainClass(r.chain)}">${r.chain}</td>
          <td class="${typeCls}">${r.type}</td>
          <td>${priceCell}</td>
          <td class="volume">${fmtVol(r.volume)}</td>
        </tr>`;
    });

    const staleHtml = stale.map(r => {
      const typeCls = r.type === 'CEX' ? 'type-cex' : 'type-dex';
      return `
        <tr class="row-stale">
          <td>${r.name} <span class="badge badge-stale">STALE</span></td>
          <td class="${chainClass(r.chain)}">${r.chain}</td>
          <td class="${typeCls}">${r.type}</td>
          <td><span class="price-val">${r.price.toFixed(6)}</span></td>
          <td class="volume">${fmtVol(r.volume)}</td>
        </tr>`;
    });

    tbody.innerHTML = activeHtml.join('') + staleHtml.join('');

    // Per-pair spread summary (DEX-DEX and CEX-DEX)
    const dexRows = active.filter(r => r.type === 'DEX');
    const cexRow  = active.find(r => r.type === 'CEX');
    const pairLines = [];

    for (let i = 0; i < dexRows.length; i++) {
      for (let j = i + 1; j < dexRows.length; j++) {
        const a = dexRows[i], b = dexRows[j];
        const key = `${a.chain}-${b.chain}`;
        const min = PAIR_THRESHOLDS[key];
        if (min === undefined) continue;
        const spread = Math.abs(a.price - b.price) / Math.min(a.price, b.price) * 10000;
        const hot = spread >= min;
        pairLines.push(`<span>${a.chain} / ${b.chain}: <b class="${hot ? 'spread-live' : ''}">${spread.toFixed(1)} bps</b> <span style="color:#444">(min ${min})</span></span>`);
      }
    }

    if (cexRow) {
      for (const dex of dexRows) {
        const min = CEX_THRESHOLDS[dex.chain];
        if (min === undefined) continue;
        const buyOnCex  = (dex.price - cexRow.effectiveAsk) / cexRow.effectiveAsk * 10000;
        const sellOnCex = (cexRow.effectiveBid - dex.price) / dex.price * 10000;
        const spread    = Math.max(buyOnCex, sellOnCex);
        const hot       = spread >= min;
        pairLines.push(`<span>Coinbase / ${dex.chain}: <b class="${hot ? 'spread-live' : ''}">${spread.toFixed(1)} bps</b> <span style="color:#444">(min ${min})</span></span>`);
      }
    }

    const summary = document.getElementById('spread-summary');
    summary.innerHTML  = pairLines.join('');
    summary.style.display = pairLines.length ? 'flex' : 'none';
  }

  // ── Arb alert ───────────────────────────────────────────────────────────────
  function checkArb(rows) {
    const banner  = document.getElementById('arb-banner');
    const dexRows = rows.filter(r => r.type === 'DEX' && !r.stale);
    const cexRow  = rows.find(r => r.type === 'CEX');
    const opps    = [];

    // DEX-to-DEX opportunities
    for (let i = 0; i < dexRows.length; i++) {
      for (let j = i + 1; j < dexRows.length; j++) {
        const a   = dexRows[i], b = dexRows[j];
        const key = `${a.chain}-${b.chain}`;
        const min = PAIR_THRESHOLDS[key];
        if (min === undefined) continue;
        const spreadBps = Math.abs(a.price - b.price) / Math.min(a.price, b.price) * 10000;
        if (spreadBps >= min) {
          const buyRow  = a.price <= b.price ? a : b;
          const sellRow = a.price <= b.price ? b : a;
          opps.push({ buyRow, sellRow, spreadBps, min });
        }
      }
    }

    // Coinbase-to-DEX opportunities (uses effective ask/bid from order book)
    if (cexRow) {
      for (const dex of dexRows) {
        const min = CEX_THRESHOLDS[dex.chain];
        if (min === undefined) continue;

        // DEX price > Coinbase effective ask → buy on Coinbase, sell on DEX
        const buyOnCex = (dex.price - cexRow.effectiveAsk) / cexRow.effectiveAsk * 10000;
        if (buyOnCex >= min) {
          opps.push({
            buyRow:  { ...cexRow, price: cexRow.effectiveAsk },
            sellRow: dex,
            spreadBps: buyOnCex,
            min,
          });
        }

        // DEX price < Coinbase effective bid → buy on DEX, sell on Coinbase
        const sellOnCex = (cexRow.effectiveBid - dex.price) / dex.price * 10000;
        if (sellOnCex >= min) {
          opps.push({
            buyRow:  dex,
            sellRow: { ...cexRow, price: cexRow.effectiveBid },
            spreadBps: sellOnCex,
            min,
          });
        }
      }
    }

    if (!opps.length) {
      dismissed = false;
      banner.classList.remove('active');
      return;
    }

    // Sort by margin above threshold (most profitable first)
    opps.sort((a, b) => (b.spreadBps - b.min) - (a.spreadBps - a.min));

    document.getElementById('opportunities-list').innerHTML = opps.map((opp, idx) => `
      ${idx > 0 ? '<hr class="opp-divider">' : ''}
      <div class="opp-header">
        <span class="opp-spread">${opp.spreadBps.toFixed(1)} bps</span>
        <span class="opp-pair">${opp.buyRow.chain} → ${opp.sellRow.chain}</span>
        <span class="opp-min">min: ${opp.min} bps</span>
      </div>
      <div class="banner-actions">
        <div class="action buy">
          <div class="action-label">Buy (cheaper)</div>
          <div class="action-venue">${opp.buyRow.name}</div>
          <div class="action-chain">${opp.buyRow.chain}</div>
          <div class="action-price">${opp.buyRow.price.toFixed(6)}</div>
          <a class="action-link" href="${opp.buyRow.tradeUrl || '#'}" target="_blank" rel="noopener">Trade →</a>
        </div>
        <div class="action sell">
          <div class="action-label">Sell (more expensive)</div>
          <div class="action-venue">${opp.sellRow.name}</div>
          <div class="action-chain">${opp.sellRow.chain}</div>
          <div class="action-price">${opp.sellRow.price.toFixed(6)}</div>
          <a class="action-link" href="${opp.sellRow.tradeUrl || '#'}" target="_blank" rel="noopener">Trade →</a>
        </div>
      </div>
    `).join('');

    if (!dismissed) {
      const wasActive = banner.classList.contains('active');
      banner.classList.add('active');
      if (!wasActive) {
        beep();
        document.getElementById('banner-time').textContent =
          `Detected at ${new Date().toLocaleTimeString()}`;
      }
    }
  }

  // ── Refresh ─────────────────────────────────────────────────────────────────
  async function refresh() {
    document.getElementById('last-updated').textContent = 'Refreshing…';
    await fetchFX().catch(() => {});

    try {
      const rows = await fetchTickers();
      renderTable(rows);
      checkArb(rows);
      document.getElementById('last-updated').textContent =
        `Last updated: ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      document.getElementById('table-body').innerHTML =
        `<tr class="error-row"><td colspan="5">Error: ${e.message}</td></tr>`;
      document.getElementById('last-updated').textContent = 'Failed to fetch data.';
    }

    startCountdown();
  }

  function startCountdown() {
    clearInterval(countdownHandle);
    countdownLeft = refreshSecs;
    const el   = document.getElementById('countdown');
    const tick = () => {
      el.className  = countdownLeft <= 5 ? 'countdown soon' : 'countdown';
      el.textContent = `Next refresh in ${countdownLeft}s`;
      countdownLeft--;
    };
    tick();
    countdownHandle = setInterval(tick, 1000);
  }

  function scheduleRefresh() {
    clearInterval(refreshHandle);
    refreshHandle = setInterval(() => { clearInterval(countdownHandle); refresh(); }, refreshSecs * 1000);
  }

  // ── Controls ─────────────────────────────────────────────────────────────────
  document.getElementById('dismiss-btn').addEventListener('click', () => {
    dismissed = true;
    document.getElementById('arb-banner').classList.remove('active');
  });

  document.getElementById('refresh-select').addEventListener('change', e => {
    refreshSecs = parseInt(e.target.value);
    scheduleRefresh();
    startCountdown();
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  refresh();
  scheduleRefresh();
</script>
</body>
</html>
